trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - main

resources:
  containers:
    - container: postgres
      image: postgres:16
      env:
        POSTGRES_USER: qa_admin
        POSTGRES_PASSWORD: wPmQF94wJE-Pt8c737ZY
        POSTGRES_DB: qa_dashboard
      ports:
        - 5999:5432

pool:
  vmImage: ubuntu-latest

jobs:
  - job: playwright
    displayName: Build and run Playwright tests
    services:
      postgres: postgres
    timeoutInMinutes: 60
    steps:
      - checkout: self

      - task: NodeTool@0
        inputs:
          versionSpec: "20.x"
        displayName: Use Node.js 20

      - script: npm ci
        displayName: Install dependencies

      - script: npx playwright install --with-deps chromium
        displayName: Install Playwright browsers

      - script: npm run build
        displayName: Build the app

      - bash: |
          set -e
          for attempt in {1..30}; do
            if node -e "const net = require('net'); const socket = net.createConnection(5999, '127.0.0.1'); socket.on('connect', () => { socket.end(); process.exit(0); }); socket.on('error', () => process.exit(1));"; then
              exit 0
            fi
            sleep 2
          done
          echo "PostgreSQL service did not become ready in time."
          exit 1
        displayName: Wait for PostgreSQL

      - script: npm run db:init
        displayName: Seed the test database
        env:
          DATABASE_URL: postgresql://qa_admin:wPmQF94wJE-Pt8c737ZY@127.0.0.1:5999/qa_dashboard?sslmode=no-verify

      - script: npm run test:pw
        displayName: Run Playwright tests
        env:
          CI: "true"
          DATABASE_URL: postgresql://qa_admin:wPmQF94wJE-Pt8c737ZY@127.0.0.1:5999/qa_dashboard?sslmode=no-verify
